name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet:
    name: .NET — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Canvas.slnx

      - name: Build
        run: dotnet build Canvas.slnx --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test Canvas.slnx \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "github;verbosity=normal"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  playwright:
    name: Playwright — E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/web/Canvas.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/web/Canvas.Web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/web/Canvas.Web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: src/web/Canvas.Web
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/web/Canvas.Web/playwright-report/

  smoke:
    name: Smoke — docker-compose
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build stack
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          timeout 90 sh -c \
            'until curl -sf http://localhost:5050/health; do sleep 3; done'

      - name: Wait for Web
        run: |
          timeout 30 sh -c \
            'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/web/Canvas.Web/package-lock.json

      - name: Install dependencies
        working-directory: src/web/Canvas.Web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/web/Canvas.Web
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: src/web/Canvas.Web
        run: npm run test:smoke

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: src/web/Canvas.Web/playwright-report/

      - name: Tear down
        if: always()
        run: docker compose down
